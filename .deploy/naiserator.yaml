apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: fpinntektsmelding-frontend
  namespace: teamforeldrepenger
  labels:
    team: teamforeldrepenger
spec:
  image: {{image}}
  port: 8080
  ingresses:
  {{#each ingresses as |url|}}
     - {{url}}
  {{/each}}
  liveness:
    path: /internal/health/isAlive
    initialDelay: 10
    timeout: 1
    periodSeconds: 5
    failureThreshold: 10
  readiness:
    path: /internal/health/isReady
    initialDelay: 10
    timeout: 1
  startup:
    path: /internal/health/isReady
    initialDelay: 10
    timeout: 1
  replicas:
    min: {{minReplicas}}
    max: {{maxReplicas}}
    scalingStrategy:
      cpu:
        thresholdPercentage: 50
  resources:
    limits:
      memory: {{limits.memory}}
    requests:
      cpu: {{requests.cpu}}
      memory: {{requests.memory}}
  observability:
    autoInstrumentation:
      enabled: true
      runtime: nodejs
    logging:
      destinations:
        - id: loki
        - id: elastic
  frontend:
    generatedConfig:
      # Provisjonerer NAIS_FRONTEND_TELEMETRY_COLLECTOR_URL i poden slik at
      # @nais/apm kan resolve collector-URL per cluster. Web-roten er /app/public
      # (se Dockerfile). Serveren injiserer verdien som <meta name="nais-telemetry-url">
      # i HTML-en (se frontendRoute.ts).
      mountPath: /app/public/nais.js
  idporten:
    enabled: true
    sidecar:
      autoLogin: true
      enabled: true
      level: idporten-loa-high
      locale: nb
  tokenx:
    enabled: true
  accessPolicy:
    outbound:
      rules:
        - application: fpinntektsmelding
        - application: nav-dekoratoren
          namespace: personbruker
  env:
    - name: NODE_ENV
      value: "production"
    - name: ENV
      value: {{ENV}}
    - name: EXPRESS_HOST
      value: "::"
    - name: EXPRESS_PORT
      value: "8080"
    - name: API_SCOPE
      value: {{API_SCOPE}}
    - name: API_URL
      value: "http://fpinntektsmelding/fpinntektsmelding"
    - name: NESTED_PATH
      value: "/fp-im-dialog"