name: "verify: server"

on:
  pull_request:
    branches:
      - "**"
    paths:
      - "server/**"
      - ".github/workflows/verify-server.yml"

defaults:
  run:
    working-directory: server

jobs:
  verify:
    name: Verify there are no lint or typescript errors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # ratchet:pnpm/action-setup@v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version: 26
          registry-url: https://npm.pkg.github.com/
          scope: "@navikt"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - name: Run Knip
        run: pnpm run knip

      - name: Run ESLint
        run: pnpm run eslint

      - name: Check for typescript errors
        run: pnpm run tsc
