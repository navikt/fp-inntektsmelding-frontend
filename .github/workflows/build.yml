name: Bygg og deploy
on:
  workflow_dispatch:
  push:
    branches:
      - "master"
    paths-ignore:
      - "**.md"
      - "**.MD"
      - ".gitignore"
      - ".editorconfig"
      - "LICENCE"
      - "CODEOWNERS"
      - ".github/dependabot.yml"

jobs:
  build-app:
    name: Build
    permissions:
      contents: read
      packages: write
      id-token: write
    runs-on: "ubuntu-latest"
    env:
      TZ: "Europe/Oslo"
    outputs:
      build-version: ${{ steps.generate-build-version.outputs.build-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # ratchet:pnpm/action-setup@v6
      - name: Set up NODE
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # ratchet:actions/setup-node@v7.0.0
        with:
          node-version: 26
          registry-url: https://npm.pkg.github.com/
          scope: "@navikt"

      - name: Install server dependencies
        run: pnpm install --frozen-lockfile
        working-directory: server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - name: Build server
        run: pnpm run build
        working-directory: server

      - name: Install webapp dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - name: Generate build version
        id: generate-build-version
        run: echo "build-version=fp-inntektsmelding-frontend-$(date +%Y.%m.%d.%H%M%S)-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build webapp
        working-directory: app
        run: pnpm run build
        env:
          VITE_SENTRY_RELEASE: ${{ steps.generate-build-version.outputs.build-version }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          # Bakes inn i asset-referansene (renderBuiltUrl) slik at appen laster assets fra CDN.
          # Workflowen kjører kun på master-push eller workflow_dispatch, og i begge tilfeller
          # laster upload-to-CDN opp assets. Derfor kan URL-en settes ubetinget.
          VITE_CDN_URL: "https://cdn.nav.no/teamforeldrepenger/fp-im-dialog/"

      - name: Copy webapp into public directory of server
        working-directory: app
        run: cp -r dist/ ../server/public
      - name: Bygg og push docker image teamforeldrepenger
        uses: navikt/fp-gha-workflows/.github/actions/build-push-docker-image@main # ratchet:exclude
        with:
          docker_context: "./server"
          dockerfile: "./server/Dockerfile"
          build-version: ${{ steps.generate-build-version.outputs.build-version }}
          push-image: true
          namespace: teamforeldrepenger

  upload-to-CDN:
    name: Upload assets to CDN
    needs: build-app
    permissions:
      contents: read
      id-token: write
    uses: navikt/fp-gha-workflows/.github/workflows/cdn-upload.yml@main
    with:
      image: ${{ needs.build-app.outputs.build-version }}
      image_suffix: ""
      destination: "/fp-im-dialog"

  deploy-dev:
    name: Deploy DEV
    permissions:
      id-token: write
    needs: [build-app, upload-to-CDN]
    uses: navikt/fp-gha-workflows/.github/workflows/deploy.yml@main
    with:
      gar: true
      image: ${{ needs.build-app.outputs.build-version }}
      cluster: dev-gcp
      naiserator_file: "naiserator.yaml"
      namespace: teamforeldrepenger
    secrets: inherit

  deploy-prod:
    if: github.ref == 'refs/heads/master'
    name: Deploy PROD
    permissions:
      id-token: write
    needs: [build-app, deploy-dev]
    uses: navikt/fp-gha-workflows/.github/workflows/deploy.yml@main
    with:
      gar: true
      image: ${{ needs.build-app.outputs.build-version }}
      cluster: prod-gcp
      naiserator_file: "naiserator.yaml"
      namespace: teamforeldrepenger
    secrets: inherit
