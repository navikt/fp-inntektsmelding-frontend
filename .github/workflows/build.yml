name: Bygg og deploy
on:
  workflow_dispatch:
  push:
    branches:
      - "master"
    paths-ignore:
      - "**.md"
      - "**.MD"
      - ".gitignore"
      - ".editorconfig"
      - "LICENCE"
      - "CODEOWNERS"
      - ".github/dependabot.yml"

jobs:
  build-app:
    name: Build
    permissions:
      contents: read
      packages: write
      id-token: write
    runs-on: "ubuntu-latest"
    env:
      TZ: "Europe/Oslo"
    outputs:
      build-version: ${{ steps.generate-build-version.outputs.build-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # ratchet:pnpm/action-setup@v6
      - name: Set up NODE
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version: 26
          registry-url: https://npm.pkg.github.com/
          scope: "@navikt"

      - name: Install server dependencies
        run: pnpm install --frozen-lockfile
        working-directory: server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - name: Build server
        run: pnpm run build
        working-directory: server

      - name: Install webapp dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - name: Generate build version
        id: generate-build-version
        run: echo "build-version=fp-inntektsmelding-frontend-$(date +%Y.%m.%d.%H%M%S)-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build webapp
        working-directory: app
        run: pnpm run build
        env:
          VITE_SENTRY_RELEASE: ${{ steps.generate-build-version.outputs.build-version }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Copy webapp into public directory of server
        working-directory: app
        run: cp -r dist/ ../server/public
      - name: Bygg og push docker image teamforeldrepenger
        uses: navikt/fp-gha-workflows/.github/actions/build-push-docker-image@main # ratchet:exclude
        with:
          docker_context: "./server"
          dockerfile: "./server/Dockerfile"
          build-version: ${{ steps.generate-build-version.outputs.build-version }}
          push-image: true
          namespace: teamforeldrepenger

  deploy-dev:
    name: Deploy DEV
    permissions:
      id-token: write
    needs: build-app
    uses: navikt/fp-gha-workflows/.github/workflows/deploy.yml@main
    with:
      gar: true
      image: ${{ needs.build-app.outputs.build-version }}
      cluster: dev-gcp
      naiserator_file: "naiserator.yaml"
      namespace: teamforeldrepenger
    secrets: inherit

  deploy-prod:
    if: github.ref == 'refs/heads/master'
    name: Deploy PROD
    permissions:
      id-token: write
    needs: [build-app, deploy-dev]
    uses: navikt/fp-gha-workflows/.github/workflows/deploy.yml@main
    with:
      gar: true
      image: ${{ needs.build-app.outputs.build-version }}
      cluster: prod-gcp
      naiserator_file: "naiserator.yaml"
      namespace: teamforeldrepenger
    secrets: inherit
